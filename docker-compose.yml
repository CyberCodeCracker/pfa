services:
  nginx:
    image: nginx:1.25-alpine
    container_name: pfa_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/dist/frontend:/var/www/frontend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - pfa_network

  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pfa_php
    volumes:
      - ./backend:/var/www/backend
      - pfa_vendor:/var/www/backend/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - mysql
      - redis
    networks:
      - pfa_network

  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pfa_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./backend:/var/www/backend
      - pfa_vendor:/var/www/backend/vendor
    ports:
      - "8080:8080"
    depends_on:
      - php-fpm
      - redis
    networks:
      - pfa_network

  queue-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pfa_queue
    command: php artisan queue:work redis --queue=broadcasts,default --tries=3 --timeout=60
    volumes:
      - ./backend:/var/www/backend
      - pfa_vendor:/var/www/backend/vendor
    depends_on:
      - php-fpm
      - redis
    restart: unless-stopped
    networks:
      - pfa_network

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: pfa_scheduler
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/backend
      - pfa_vendor:/var/www/backend/vendor
    depends_on:
      - php-fpm
      - mysql
    restart: unless-stopped
    networks:
      - pfa_network

  mysql:
    image: mysql:8.0
    container_name: pfa_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pfa_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-pfa_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pfa_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - pfa_network

  redis:
    image: redis:7-alpine
    container_name: pfa_redis
    ports:
      - "6379:6379"
    volumes:
      - pfa_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - pfa_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: pfa_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pfa_network

volumes:
  pfa_mysql_data:
  pfa_redis_data:
  pfa_vendor:

networks:
  pfa_network:
    driver: bridge
