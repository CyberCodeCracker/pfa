<div class="bg-surface-container-lowest rounded-2xl p-6 min-w-[360px] max-w-md">

  <div class="flex items-start gap-4 mb-5">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center shrink-0"
         [class.bg-error-container]="isDanger"
         [class.text-on-error-container]="isDanger"
         [class.bg-primary-container]="!isDanger"
         [class.text-on-primary-container]="!isDanger">
      <span class="material-symbols-outlined" style="font-size:26px;">
        {{ isDanger ? 'warning' : 'help' }}
      </span>
    </div>
    <div class="flex-1 min-w-0">
      <h2 class="font-headline text-lg font-extrabold text-on-surface mb-1">{{ data.title }}</h2>
      <p class="text-sm text-on-surface-variant leading-relaxed">{{ data.message }}</p>
    </div>
  </div>

  <div class="flex justify-end gap-2 pt-2">
    <button (click)="cancel()"
            class="px-4 py-2.5 rounded-xl bg-surface-container hover:bg-surface-container-high text-on-surface text-sm font-bold transition-all active:scale-95">
      {{ cancelLabel }}
    </button>
    <button (click)="confirm()"
            [ngClass]="isDanger ? 'bg-error hover:bg-error/90' : 'bg-primary hover:bg-primary/90'"
            class="px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-sm hover:shadow-md active:scale-95 transition-all">
      {{ confirmLabel }}
    </button>
  </div>
</div>
