<div class="page-container">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Notifications</h1>
      <p *ngIf="unreadCount > 0" class="text-blue-600 text-sm mt-1">
        {{ unreadCount }} non lue(s)
      </p>
    </div>
    <button *ngIf="unreadCount > 0" mat-stroked-button (click)="markAllRead()">
      <mat-icon>done_all</mat-icon>
      Tout marquer comme lu
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && notifications.length === 0"
       class="text-center py-16 bg-white rounded-xl border border-gray-200">
    <mat-icon class="!text-6xl text-gray-300 mb-4">notifications_none</mat-icon>
    <p class="text-gray-500">Aucune notification pour le moment.</p>
  </div>

  <div *ngIf="!loading && notifications.length > 0"
       class="bg-white rounded-xl border border-gray-200 divide-y divide-gray-100">
    <div *ngFor="let notif of notifications"
         class="notif-row flex items-start gap-4 p-4 cursor-pointer hover:bg-gray-50 transition-colors"
         [class.unread]="!notif.read_at"
         (click)="markRead(notif)">
      <!-- Icon -->
      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
           [class.bg-blue-100]="!notif.read_at"
           [class.bg-gray-100]="!!notif.read_at">
        <mat-icon [class.text-blue-600]="!notif.read_at" [class.text-gray-400]="!!notif.read_at">
          {{ getNotifIcon(notif.type) }}
        </mat-icon>
      </div>

      <!-- Content -->
      <div class="flex-1 min-w-0">
        <p class="text-sm" [class.font-semibold]="!notif.read_at" [class.text-gray-900]="!notif.read_at"
           [class.text-gray-600]="!!notif.read_at">
          {{ getNotifMessage(notif) }}
        </p>
        <p class="text-xs text-gray-400 mt-1">{{ notif.created_at | date:'dd/MM/yyyy HH:mm' }}</p>
      </div>

      <!-- Unread dot -->
      <div *ngIf="!notif.read_at" class="w-2 h-2 rounded-full bg-blue-500 mt-2 flex-shrink-0"></div>
    </div>
  </div>
</div>
