<app-breadcrumbs [items]="[{ label: 'Étudiants' }]"></app-breadcrumbs>

<!-- Page Header -->
<div class="flex justify-between items-end mb-10">
  <div>
    <h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight">Gestion des Étudiants</h2>
  </div>
</div>

<!-- Table container -->
<div class="bg-surface-container-lowest rounded-2xl overflow-hidden shadow-sm border border-outline-variant/10">

  <!-- Filters bar -->
  <div class="p-6 bg-surface-container-low/50 flex flex-wrap items-center justify-between gap-4 border-b border-outline-variant/10">
    <div class="relative flex-1 max-w-md">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:20px;">search</span>
      <input type="text" [(ngModel)]="search" (input)="onSearch()"
             placeholder="Rechercher un étudiant…"
             class="w-full pl-12 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant/20 rounded-full text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all placeholder:text-on-surface-variant/50">
    </div>
    <p class="text-xs font-bold text-on-surface-variant uppercase">{{ rows.length }} étudiant(s)</p>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="p-12 text-center text-on-surface-variant">
    <span class="material-symbols-outlined animate-spin">progress_activity</span>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && rows.length === 0" class="p-16 text-center">
    <span class="material-symbols-outlined text-outline" style="font-size:48px;">person_off</span>
    <p class="text-on-surface-variant mt-3">Aucun étudiant trouvé.</p>
  </div>

  <!-- Table -->
  <div *ngIf="!loading && rows.length > 0" class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-surface-container/50 border-b border-outline-variant/10">
          <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Étudiant</th>
          <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Email</th>
          <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Stage</th>
          <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider">Statut</th>
          <th class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-outline-variant/10">
        <tr *ngFor="let r of rows" class="hover:bg-surface-container-low transition-colors group">
          <td class="px-6 py-5">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center font-bold text-xs">
                {{ r.user.prenom[0] }}{{ r.user.nom[0] }}
              </div>
              <div>
                <p class="text-sm font-bold text-on-surface leading-none">{{ r.user.nom }}</p>
                <p class="text-sm text-on-surface-variant mt-1">{{ r.user.prenom }}</p>
              </div>
            </div>
          </td>
          <td class="px-6 py-5 text-sm text-on-surface-variant">{{ r.user.email }}</td>
          <td class="px-6 py-5">
            <a (click)="goToStage(r.stage.id)" class="text-sm font-semibold text-primary hover:underline cursor-pointer">{{ r.stage.titre }}</a>
          </td>
          <td class="px-6 py-5">
            <span class="px-3 py-1 rounded-full text-xs font-bold"
                  [class.bg-tertiary-container]="r.statut === 'actif'"
                  [class.text-on-tertiary-container]="r.statut === 'actif'"
                  [class.bg-secondary-container]="r.statut === 'invité'"
                  [class.text-on-secondary-container]="r.statut === 'invité'"
                  [class.bg-surface-container]="r.statut === 'retiré'"
                  [class.text-on-surface-variant]="r.statut === 'retiré'">
              {{ r.statut }}
            </span>
          </td>
          <td class="px-6 py-5 text-right">
            <div class="flex items-center justify-end gap-2">
              <button (click)="goToStage(r.stage.id)" class="p-2 text-on-surface-variant hover:text-primary hover:bg-primary-fixed rounded-lg transition-all" title="Voir le stage">
                <span class="material-symbols-outlined" style="font-size:18px;">visibility</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
