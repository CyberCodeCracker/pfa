<div class="min-h-screen flex items-center justify-center p-6 bg-surface-container-low">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-lg p-10 space-y-6">

    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-primary-fixed rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined filled text-primary">lock_reset</span>
      </div>
      <div>
        <h2 class="font-headline text-2xl font-extrabold text-primary tracking-tight">Mot de passe oublié</h2>
        <p class="text-on-surface-variant text-sm">Recevez un lien de réinitialisation par email.</p>
      </div>
    </div>

    <div *ngIf="sent" class="bg-tertiary-container text-on-tertiary-container rounded-lg px-4 py-3 text-sm flex items-center gap-2">
      <span class="material-symbols-outlined" style="font-size:18px;">mark_email_read</span>
      Si cet email existe, un lien de réinitialisation a été envoyé.
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-on-surface-variant mb-2">Email</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size:20px;">alternate_email</span>
          <input type="email" formControlName="email" placeholder="votre@email.tn"
                 class="w-full pl-10 pr-4 py-3 bg-surface-container-low ghost-border rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
        </div>
      </div>
      <button type="submit" [disabled]="form.invalid"
              class="w-full editorial-gradient text-white py-4 rounded-xl font-bold shadow-lg hover:shadow-xl active:scale-[0.98] transition-all disabled:opacity-60 disabled:cursor-not-allowed">
        Envoyer le lien
      </button>
      <a routerLink="/login" class="block text-center text-sm font-bold text-primary hover:underline">← Retour à la connexion</a>
    </form>
  </div>
</div>
