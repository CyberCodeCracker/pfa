<div class="min-h-screen flex items-center justify-center p-6 bg-surface-container-low">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-lg p-10 space-y-6">

    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-primary-fixed rounded-xl flex items-center justify-center">
        <span class="material-symbols-outlined filled text-primary">key</span>
      </div>
      <div>
        <h2 class="font-headline text-2xl font-extrabold text-primary tracking-tight">Accepter l'invitation</h2>
        <p class="text-on-surface-variant text-sm">Définissez votre mot de passe.</p>
      </div>
    </div>

    <div *ngIf="error" class="bg-error-container text-on-error-container rounded-lg px-4 py-3 text-sm flex items-center gap-2">
      <span class="material-symbols-outlined" style="font-size:18px;">error</span>
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-on-surface-variant mb-2">Nouveau mot de passe</label>
        <input type="password" formControlName="password"
               class="w-full px-4 py-3 bg-surface-container-low ghost-border rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
        <p class="text-xs text-on-surface-variant mt-1">Min. 10 caractères, mixte de majuscules/minuscules et chiffres.</p>
      </div>
      <div>
        <label class="block text-sm font-semibold text-on-surface-variant mb-2">Confirmer le mot de passe</label>
        <input type="password" formControlName="password_confirmation"
               class="w-full px-4 py-3 bg-surface-container-low ghost-border rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
      </div>
      <button type="submit" [disabled]="form.invalid || loading"
              class="w-full editorial-gradient text-white py-4 rounded-xl font-bold shadow-lg hover:shadow-xl active:scale-[0.98] transition-all disabled:opacity-60 disabled:cursor-not-allowed">
        {{ loading ? 'Activation…' : 'Activer mon compte' }}
      </button>
    </form>
  </div>
</div>
