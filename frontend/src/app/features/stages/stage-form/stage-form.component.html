<div class="flex gap-8 max-w-7xl mx-auto">

  <!-- Left column: form -->
  <div class="flex-1 flex flex-col gap-8 pb-20">

    <header>
      <h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight mb-2">
        {{ isEdit ? 'Modifier le Stage' : 'Nouveau Sujet de Stage' }}
      </h1>
      <p class="text-on-surface-variant max-w-2xl">Définissez une nouvelle opportunité de recherche et trouvez le match académique parfait.</p>
    </header>

    <div *ngIf="error" class="bg-error-container text-on-error-container rounded-lg p-4 text-sm">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8">

      <!-- Informations Générales -->
      <section class="bg-surface-container-lowest p-8 rounded-2xl border border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-8 h-8 rounded-lg bg-primary-fixed flex items-center justify-center">
            <span class="material-symbols-outlined filled text-primary" style="font-size:18px;">description</span>
          </span>
          <h2 class="font-headline text-xl font-bold text-primary">Informations Générales</h2>
        </div>
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Titre du Projet</label>
            <input formControlName="titre" type="text"
                   placeholder="Ex: Optimisation des Algorithmes de Deep Learning pour la Santé"
                   class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
            <p *ngIf="form.get('titre')?.touched && form.get('titre')?.invalid" class="text-xs text-error mt-1 ml-1">Titre requis.</p>
          </div>
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Description Détaillée</label>
            <textarea formControlName="description" rows="6"
                      placeholder="Décrivez les objectifs, la méthodologie et les livrables attendus..."
                      class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all"></textarea>
          </div>
        </div>
      </section>

      <!-- Dates -->
      <section class="bg-surface-container-lowest p-8 rounded-2xl border border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-8 h-8 rounded-lg bg-primary-fixed flex items-center justify-center">
            <span class="material-symbols-outlined filled text-primary" style="font-size:18px;">event</span>
          </span>
          <h2 class="font-headline text-xl font-bold text-primary">Dates du Stage</h2>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Date de début</label>
            <input formControlName="date_debut" type="date"
                   class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Date de fin</label>
            <input formControlName="date_fin" type="date"
                   class="w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all">
          </div>
        </div>
      </section>

      <!-- Paramètres Académiques -->
      <section class="bg-surface-container-lowest p-8 rounded-2xl border border-outline-variant/20 shadow-sm">
        <div class="flex items-center gap-3 mb-6">
          <span class="w-8 h-8 rounded-lg bg-primary-fixed flex items-center justify-center">
            <span class="material-symbols-outlined filled text-primary" style="font-size:18px;">account_balance</span>
          </span>
          <h2 class="font-headline text-xl font-bold text-primary">Paramètres Académiques</h2>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Niveau demandé</label>
            <select formControlName="niveau"
                    class="pill-select w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none">
              <option value="">— Sélectionner —</option>
              <option *ngFor="let n of niveaux" [value]="n">{{ n }}</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Établissement</label>
            <select formControlName="etablissement_id"
                    class="pill-select w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none">
              <option [ngValue]="null">— Sélectionner —</option>
              <option *ngFor="let e of etablissements" [ngValue]="e.id">{{ e.nom }}</option>
            </select>
          </div>
          <div *ngIf="isEdit" class="col-span-2">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1">Statut</label>
            <select formControlName="statut"
                    class="pill-select w-full px-4 py-3 rounded-xl bg-surface-container-low border-transparent text-on-surface font-medium focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none">
              <option *ngFor="let s of statuts" [value]="s.value">{{ s.label }}</option>
            </select>
          </div>
        </div>
      </section>
    </form>
  </div>

  <!-- Right sidebar — actions (sticky) -->
  <aside class="w-80 flex flex-col gap-6 sticky top-24 h-fit">
    <div class="bg-surface-container-lowest p-6 rounded-2xl border border-outline-variant/20 shadow-sm flex flex-col gap-3">
      <button type="button" (click)="onSubmit()" [disabled]="form.invalid || loading"
              class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-3.5 rounded-xl font-bold shadow-md hover:shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:20px;">rocket_launch</span>
        {{ isEdit ? 'Enregistrer' : 'Publier le Stage' }}
      </button>
      <button type="button" routerLink="/stages"
              class="w-full bg-surface-container-high text-primary py-3.5 rounded-xl font-bold hover:bg-surface-container-highest transition-all active:scale-95 flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-size:20px;">close</span>
        Annuler
      </button>
    </div>
  </aside>
</div>
