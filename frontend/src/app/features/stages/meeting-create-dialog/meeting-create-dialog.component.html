<div class="p-2 bg-surface-container-lowest">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center">
      <span class="material-symbols-outlined filled text-primary">videocam</span>
    </div>
    <h2 class="font-headline text-xl font-extrabold text-primary tracking-tight">Créer une réunion</h2>
  </div>

  <div *ngIf="error" class="bg-error-container text-on-error-container rounded-lg px-3 py-2 text-sm mb-4">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

    <div>
      <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Sujet</label>
      <input formControlName="sujet" type="text" placeholder="Ex: Point d'avancement mi-stage"
             class="w-full px-3 py-2.5 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none">
    </div>

    <div>
      <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Description (optionnel)</label>
      <textarea formControlName="description" rows="2"
                class="w-full px-3 py-2.5 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Date & heure</label>
        <input type="datetime-local" formControlName="scheduled_at"
               class="w-full px-3 py-2.5 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none"
               [class.border-error]="form.get('scheduled_at')?.touched && form.get('scheduled_at')?.invalid"
               [class.ring-2]="form.get('scheduled_at')?.touched && form.get('scheduled_at')?.invalid"
               [class.ring-error]="form.get('scheduled_at')?.touched && form.get('scheduled_at')?.invalid">
        <p *ngIf="form.get('scheduled_at')?.touched && form.get('scheduled_at')?.errors?.['pastDate']"
           class="text-xs text-error mt-1 flex items-center gap-1">
          <span class="material-symbols-outlined" style="font-size:14px;">error</span>
          La date et l'heure doivent être dans le futur.
        </p>
        <p *ngIf="form.get('scheduled_at')?.touched && form.get('scheduled_at')?.errors?.['required']"
           class="text-xs text-error mt-1 flex items-center gap-1">
          <span class="material-symbols-outlined" style="font-size:14px;">error</span>
          Ce champ est requis.
        </p>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Durée (min)</label>
        <input type="number" formControlName="duration_minutes" min="15" max="480"
               class="w-full px-3 py-2.5 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none">
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Lien Google Meet (optionnel)</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-size:18px;">videocam</span>
        <input formControlName="meet_url" type="text" placeholder="https://meet.google.com/xxx-xxxx-xxx"
               class="w-full pl-10 pr-3 py-2.5 rounded-lg bg-surface-container-low border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none">
      </div>
      <p class="text-[10px] text-on-surface-variant mt-1">Collez le lien généré depuis Google Meet.</p>
    </div>

    <div>
      <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">
        Participants
        <span *ngIf="loadingStudents" class="text-on-surface-variant/60 font-normal">— Chargement…</span>
      </p>
      <div *ngIf="!loadingStudents && students.length === 0" class="text-sm text-on-surface-variant italic">
        Aucun étudiant actif dans ce stage.
      </div>
      <div *ngIf="!loadingStudents && students.length > 0" class="flex flex-wrap gap-2">
        <button *ngFor="let s of students" type="button" (click)="toggleParticipant(s.id)"
                [class.bg-primary]="isSelected(s.id)"
                [class.text-white]="isSelected(s.id)"
                [class.bg-surface-container-low]="!isSelected(s.id)"
                [class.text-on-surface]="!isSelected(s.id)"
                class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold border border-outline-variant/20 hover:border-primary/40 transition-all">
          <span class="w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold"
                [ngClass]="isSelected(s.id) ? 'bg-white/30 text-white' : 'bg-primary-fixed text-on-primary-fixed'">
            {{ s.prenom[0] }}{{ s.nom[0] }}
          </span>
          {{ s.prenom }} {{ s.nom }}
        </button>
      </div>
    </div>
  </form>

  <div class="flex justify-end gap-2 mt-6 pt-4 border-t border-outline-variant/10">
    <button type="button" (click)="cancel()"
            class="bg-surface-container-high text-primary px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-surface-container-highest transition-all">
      Annuler
    </button>
    <button type="button" (click)="onSubmit()" [disabled]="form.invalid || loading"
            class="bg-primary text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
      <span *ngIf="loading" class="material-symbols-outlined animate-spin" style="font-size:16px;">progress_activity</span>
      Créer la réunion
    </button>
  </div>
</div>
