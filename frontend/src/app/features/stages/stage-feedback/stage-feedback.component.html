<div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/10 p-6 mt-6">
  <div class="flex items-center justify-between mb-6">
    <h3 class="font-headline text-xl font-extrabold text-primary flex items-center gap-2">
      Feedbacks
      <span class="px-2 py-0.5 bg-surface-container-high rounded text-xs font-bold text-on-surface-variant">{{ feedbacks.length }}</span>
    </h3>
    <button *ngIf="isEnseignant" (click)="showForm = !showForm"
            class="bg-primary text-white px-4 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-primary/20 hover:scale-[1.02] transition-all flex items-center gap-2">
      <span class="material-symbols-outlined" style="font-size:18px;">rate_review</span>
      {{ showForm ? 'Fermer' : 'Nouveau feedback' }}
    </button>
  </div>

  <!-- Form -->
  <div *ngIf="showForm && isEnseignant" class="bg-primary-fixed/40 border border-primary-fixed rounded-2xl p-5 mb-5">
    <p *ngIf="formError" class="text-on-error-container bg-error-container rounded-lg px-3 py-2 text-sm mb-3">{{ formError }}</p>
    <form [formGroup]="form" (ngSubmit)="submitFeedback()" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Étudiant</label>
          <select formControlName="etudiant_id"
                  class="pill-select w-full px-3 py-2 rounded-lg bg-surface-container-lowest border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none">
            <option [ngValue]="null">— Sélectionner —</option>
            <option *ngFor="let s of students" [ngValue]="s.id">{{ s.prenom }} {{ s.nom }}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Note /20 (optionnel)</label>
          <input type="number" formControlName="note" min="0" max="20" step="0.5"
                 class="w-full px-3 py-2 rounded-lg bg-surface-container-lowest border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Commentaire</label>
        <textarea formControlName="contenu" rows="4" placeholder="Votre retour sur le travail de l'étudiant…"
                  class="w-full px-3 py-2 rounded-lg bg-surface-container-lowest border border-outline-variant/20 text-sm focus:ring-2 focus:ring-primary/20 focus:outline-none"></textarea>
      </div>
      <div class="flex gap-2">
        <button type="submit" [disabled]="form.invalid || submitting"
                class="bg-primary text-white px-5 py-2 rounded-xl font-bold text-sm shadow-md hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
          <span *ngIf="submitting" class="material-symbols-outlined animate-spin" style="font-size:16px;">progress_activity</span>
          Enregistrer
        </button>
        <button type="button" (click)="showForm = false"
                class="bg-surface-container-high text-primary px-5 py-2 rounded-xl font-bold text-sm hover:bg-surface-container-highest transition-all">
          Annuler
        </button>
      </div>
    </form>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center py-6 text-on-surface-variant">
    <span class="material-symbols-outlined animate-spin">progress_activity</span>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && feedbacks.length === 0" class="text-center py-12 text-on-surface-variant">
    <span class="material-symbols-outlined text-outline" style="font-size:40px;">rate_review</span>
    <p class="text-sm mt-2">Aucun feedback pour l'instant.</p>
  </div>

  <!-- Feedback list -->
  <div *ngIf="!loading && feedbacks.length > 0" class="space-y-3">
    <div *ngFor="let f of feedbacks" class="flex gap-3 p-4 bg-surface-container-low rounded-xl">
      <div class="w-10 h-10 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center text-xs font-bold flex-shrink-0">
        {{ getInitials(f.etudiant) }}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1 flex-wrap">
          <span class="font-bold text-sm text-on-surface">{{ f.etudiant?.prenom }} {{ f.etudiant?.nom }}</span>
          <span *ngIf="f.note !== null && f.note !== undefined"
                class="text-xs bg-primary-fixed text-on-primary-fixed px-2 py-0.5 rounded-full font-bold">
            {{ f.note }}/20
          </span>
          <span class="text-xs text-on-surface-variant">{{ f.created_at | date:'dd/MM/yyyy' }}</span>
        </div>
        <p class="text-sm text-on-surface-variant leading-relaxed">{{ f.contenu }}</p>
      </div>
    </div>
  </div>
</div>
